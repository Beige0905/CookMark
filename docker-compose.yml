services:
  db:
    image: postgres:16-alpine
    container_name: recipe_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recipe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recipe_pass}
      POSTGRES_DB: ${POSTGRES_DB:-recipe_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipe_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe_backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-recipe_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-recipe_pass}
      DB_NAME: ${POSTGRES_DB:-recipe_db}
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipe_frontend
    environment:
      PUBLIC_API_URL: http://backend:8080
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
